<!DOCTYPE html>
<html>
  <head>
    <title>Rock-Paper-Scissors_JS</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <p class="title-bar">Rock Paper Scissors Game</p>

    <button  class="move-button js-rock-button"><img src="rock-emoji.png" class="move-icon"></button>

    <button onclick = "
    playGame('Paper')
    " class="move-button"><img src="paper-emoji.png" class="move-icon"></button>

    <button onclick="
    playGame('Scissors')
    " class="move-button"><img src="scissors-emoji.png" class="move-icon"></button>

    <p class="js_result result"></p>

    <p class="js_moves"></p>

    <p class="js_score score"></p>

    <button onclick="
    score.wins = 0;
    score.looses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    updateScore();
    " class="reset-score-button">Reset Score</button>

    <button onclick="
    autoPlay();
    " class="autoplay-button">Auto Play</button>

  <script src="script.js">
  </script>
  </body>

</html>
